<style>.shop-page--locked-category .sf__section--search + .sf__section{display:none}</style>
<script>
(function () {
	if (window.aiZippyLockedCategoryFetch) {
		return;
	}

	window.aiZippyLockedCategoryFetch = true;
	var lockedCategory = "chocolates";
	var originalFetch = window.fetch.bind(window);

	window.fetch = function (resource, init) {
		var requestUrl = typeof resource === "string" ? resource : resource.url;

		if (requestUrl && requestUrl.indexOf("/wp-json/ai-zippy/v1/products") !== -1) {
			var url = new URL(requestUrl, window.location.origin);
			url.searchParams.set("category", lockedCategory);
			resource = typeof resource === "string" ? url.toString() : new Request(url.toString(), resource);
		}

		return originalFetch(resource, init);
	};
}());
</script>
<div id="ai-zippy-shop-filter" data-config='{"layout":"sidebar","category":"chocolates","locked_category":"chocolates"}'></div>
